<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Redirecting to Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="0; url=service-detail.html?service=sea" />
<meta name="robots" content="noindex, follow" />
<link rel="canonical" href="https://joinedlink.com/service-detail.html?service=sea" />
<script>
(function () {
    try {
        var url = new URL(window.location.href);
        var lang = url.searchParams.get("lang");
        var target = "service-detail.html?service=sea";
        if (lang === "zh" || lang === "en") {
            target += "&lang=" + lang;
        }
        window.location.replace(target);
    } catch (e) {
        window.location.replace("service-detail.html?service=sea");
    }
})();
</script>
</head>
<body>
<p>Redirecting to <a href="service-detail.html?service=sea">Services</a>...</p>
</body>
</html>
