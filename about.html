<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Redirecting to About Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="0; url=about-detail.html?section=profile" />
<meta name="robots" content="noindex, follow" />
<link rel="canonical" href="https://joinedlink.com/about-detail.html?section=profile" />
<script>
(function () {
    try {
        var url = new URL(window.location.href);
        var lang = url.searchParams.get("lang");
        var target = "about-detail.html?section=profile";
        if (lang === "zh" || lang === "en") {
            target += "&lang=" + lang;
        }
        window.location.replace(target);
    } catch (e) {
        window.location.replace("about-detail.html?section=profile");
    }
})();
</script>
</head>
<body>
<p>Redirecting to <a href="about-detail.html?section=profile">About Us</a>...</p>
</body>
</html>
